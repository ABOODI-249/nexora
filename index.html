<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXORA SHOOP</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#050816,#0b1220,#071a2e);
color:white;
overflow-x:hidden;
}

header{
text-align:center;
padding:18px;
background:rgba(255,255,255,0.04);
backdrop-filter: blur(15px);
border-bottom:1px solid rgba(255,255,255,0.08);
position:sticky;
top:0;
z-index:10;
}

.logo{
font-size:26px;
font-weight:bold;
background:linear-gradient(90deg,#38bdf8,#a78bfa,#22c55e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.dev{font-size:11px;opacity:0.7;}

.back{
display:none;
margin:10px 15px;
padding:8px 12px;
border-radius:10px;
background:rgba(255,255,255,0.06);
cursor:pointer;
width:fit-content;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
padding:15px;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
padding:18px;
border-radius:16px;
text-align:center;
cursor:pointer;
transition:0.3s;
backdrop-filter: blur(10px);
}

.card:hover{
transform:scale(1.06);
border-color:#38bdf8;
box-shadow:0 0 20px rgba(56,189,248,0.25);
}

.card i{font-size:24px;margin-bottom:6px;color:#7dd3fc;}

.page{display:none;padding:15px;animation:fade 0.3s ease;}
.active{display:block;}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.service{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
padding:18px;
border-radius:16px;
margin-bottom:12px;
}

.btn{
display:inline-block;
margin-top:10px;
padding:8px 12px;
border-radius:10px;
text-decoration:none;
font-size:13px;
color:white;
margin-right:6px;
background:linear-gradient(90deg,#22c55e,#16a34a);
}

.btn.tg{
background:linear-gradient(90deg,#3b82f6,#2563eb);
}
</style>
</head>

<body>

<header>
<div class="logo">NEXORA SHOOP</div>
<div class="dev">𝐃𝐄𝐕  𝐀𝐁𝐎𝐎𝐃𝐈</div>
</header>

<div class="back" id="back" onclick="goBack()">⬅ رجوع</div>

<div id="home" class="page active">
<div class="grid">

<div class="card" onclick="openPage('whatsapp')"><i class="fab fa-whatsapp"></i><br>واتساب</div>
<div class="card" onclick="openPage('telegram')"><i class="fab fa-telegram"></i><br>تلجرام</div>
<div class="card" onclick="openPage('instagram')"><i class="fab fa-instagram"></i><br>انستغرام</div>
<div class="card" onclick="openPage('tiktok')"><i class="fab fa-tiktok"></i><br>تيك توك</div>

</div>
</div>

<div id="whatsapp" class="page"><div id="whatsappList"></div></div>
<div id="telegram" class="page"><div id="telegramList"></div></div>
<div id="instagram" class="page"><div id="instagramList"></div></div>
<div id="tiktok" class="page"><div id="tiktokList"></div></div>

<script>

/* ================= GLOBAL NUMBER ================= */
const WA_NUMBER = "249113388050";

/* ================= DATA ================= */
const servicesData = {
  whatsapp: [
    { title:"اسبام ارقام", desc:"حل مشاكل الابتزاز و التنمر" },
    { title:"فتح ارقام", desc:"فتح الارقام اي من كان نوع الحظر" },
    { title:"توثيق ارقام", desc:"توثيق ميتا Ai ضد الحظر" }
  ],

  telegram: [
    { title:"دعم تلجرام", desc:"حل مشاكل الحساب" },
    { title:"انشاء بوت", desc:"طريقة انشاء بوت تلجرام" }
  ],

  instagram: [
    { title:"تطير حسابات", desc:"حظر الحساب" }
  ],

  tiktok: [
    { title:"دعم تيك توك", desc:"مشاكل الحساب" }
  ]
};

/* ================= LOAD ================= */
function loadServices(category, containerId){

  let data = servicesData[category] || [];
  let html = "";

  data.forEach(item=>{
    html += `
      <div class="service">
        <b>${item.title}</b><br>
        <small>${item.desc}</small><br>

        <a class="btn" onclick="sendMessage('${item.title}','${item.desc}')">واتساب</a>
      </div>
    `;
  });

  document.getElementById(containerId).innerHTML = html || "لا توجد خدمات";
}

/* ================= MESSAGE SYSTEM ================= */
function sendMessage(title, desc){

  let message = `مرحباً 👋
أرغب في طلب خدمة: ${title}
تفاصيل: ${desc}`;

  let url = "https://wa.me/" + WA_NUMBER + "?text=" + encodeURIComponent(message);

  window.open(url, "_blank");
}

/* ================= NAV ================= */
let historyStack = [];

function openPage(id){

  let current = document.querySelector('.page.active').id;
  historyStack.push(current);

  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.getElementById("back").style.display="block";

  loadServices(id, id+"List");
}

function goBack(){
  let last = historyStack.pop();

  if(!last){
    document.getElementById("back").style.display="none";
    openPage('home');
    return;
  }

  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(last).classList.add('active');
}

</script>

</body>
</html>
