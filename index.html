header{

.back{

.card i{font-size:24px;margin-bottom:6px;color:#7dd3fc;}

.page{display:none;padding:15px;animation:fade 0.3s ease;}
.active{display:block;}

from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

color:white;
margin-right:6px;

/* ================= LOAD ================= */
function loadServices(category, containerId){

  let data = servicesData[category] || [];
  let html = "";

  data.forEach(item=>{

    let message = `مرحباً 👋
أريد طلب الخدمة:
📌 الخدمة: ${item.title}
📝 التفاصيل: ${item.desc}`;

    let waLink = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(message)}`;
    let tgLink = `https://t.me/${item.tg}`;

    html += `
      <div class="service">
        <b>${item.title}</b><br>
        <small>${item.desc}</small><br>

        <a class="btn" href="${waLink}" target="_blank">واتساب</a>
        <a class="btn tg" href="${tgLink}" target="_blank">تلجرام</a>
      </div>
    `;
  });

  document.getElementById(containerId).innerHTML = html || "لا توجد خدمات";
}

/* ================= NAV ================= */
let historyStack = [];

function openPage(id){
  let current = document.querySelector('.page.active').id;
  historyStack.push(current);

  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.getElementById("back").style.display="block";

  loadServices(id, id+"List");
}

function goBack(){
  let last = historyStack.pop();

  if(!last){
    document.getElementById("back").style.display="none";
    openPage('home');
    return;
  }

  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(last).classList.add('active');
}
