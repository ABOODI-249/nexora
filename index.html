/* ================= LOAD ================= */
function loadServices(category, containerId){

  let data = servicesData[category] || [];
  let html = "";

  data.forEach(item=>{
    html += `
      <div class="service">
        <b>${item.title}</b><br>
        <small>${item.desc}</small><br>

        <a class="btn" href="https://wa.me/${item.wa}" target="_blank">واتساب</a>
        <a class="btn tg" href="https://t.me/${item.tg}" target="_blank">تلجرام</a>
      </div>
    `;
  });

  document.getElementById(containerId).innerHTML = html || "لا توجد خدمات";
}

/* ================= NAV ================= */
let historyStack = [];

function openPage(id){

  let current = document.querySelector('.page.active').id;
  historyStack.push(current);

  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.getElementById("back").style.display="block";

  loadServices(id, id+"List");
}

function goBack(){
  let last = historyStack.pop();

  if(!last){
    document.getElementById("back").style.display="none";
    openPage('home');
    return;
  }

  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(last).classList.add('active');
}
